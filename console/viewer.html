<!doctype html>
<!--
  Arna viewer — a minimal browser console for Phase 1c.

  1. Run the backend:  cargo run --manifest-path backend/Cargo.toml
  2. Run the agent:    cargo run -p arna-agent --release -- ws://127.0.0.1:8081/ws agent-1
  3. Open this file in a browser, set the agent id to "agent-1", click Connect.

  The browser is the offerer: it creates a "screen" data channel, the agent
  answers and streams JPEG frames onto it, and we draw each frame to an <img>.
  (This standalone page becomes the Tauri Console app in a later phase.)
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arna Viewer</title>
    <style>
      body { margin: 0; background: #0b0b10; color: #e7e7ea; font-family: system-ui, sans-serif; }
      [hidden] { display: none !important; }
      #bar { display: flex; gap: 10px; align-items: center; padding: 10px 14px; background: #15151f; border-bottom: 1px solid #2a2a36; flex-wrap: wrap; }
      input { padding: 6px 8px; border-radius: 6px; border: 1px solid #333; background: #0b0b10; color: #e7e7ea; }
      button { padding: 6px 14px; border-radius: 6px; border: 0; background: #6d5efc; color: #fff; font-weight: 600; cursor: pointer; }
      #status { margin-left: auto; font-size: 13px; color: #9aa; }
      #screen { display: block; max-width: 100%; margin: 0 auto; background: #000; }
      .empty { display: grid; place-items: center; height: 70vh; color: #556; }
    </style>
  </head>
  <body>
    <div id="bar">
      <label>Backend <input id="url" value="ws://127.0.0.1:8081/ws" size="26" /></label>
      <label>Agent id <input id="agent" value="agent-1" size="12" /></label>
      <button id="connect">Connect</button>
      <span id="status">idle</span>
    </div>
    <div class="empty" id="placeholder">No stream yet — click Connect.</div>
    <img id="screen" alt="remote screen" hidden />

    <script>
      const $ = (id) => document.getElementById(id);
      let ws, pc, lastUrl;

      const setStatus = (s) => ($("status").textContent = s);

      $("connect").onclick = () => start();

      function start() {
        if (ws) ws.close();
        const url = $("url").value.trim();
        const agentId = $("agent").value.trim();
        const myId = "viewer-" + Math.floor(Math.random() * 1e6);

        ws = new WebSocket(url);
        ws.onopen = () => {
          ws.send(JSON.stringify({ type: "register", role: "console", id: myId }));
          setStatus("connecting…");
          offer(agentId);
        };
        ws.onclose = () => setStatus("disconnected");
        ws.onerror = () => setStatus("ws error");
        ws.onmessage = async (ev) => {
          const m = JSON.parse(ev.data);
          if (m.type === "signal") {
            const d = m.data;
            if (d.kind === "answer") {
              await pc.setRemoteDescription({ type: "answer", sdp: d.sdp });
            } else if (d.kind === "ice") {
              try { await pc.addIceCandidate(d.candidate); } catch (e) { console.warn(e); }
            }
          } else if (m.type === "peer_offline") {
            setStatus("agent offline (" + m.to + ") — is it running?");
          } else if (m.type === "error") {
            setStatus("error: " + m.message);
          }
        };

        async function offer(agentId) {
          pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
          pc.onicecandidate = (e) => {
            if (e.candidate) {
              ws.send(JSON.stringify({ type: "signal", to: agentId, data: { kind: "ice", candidate: e.candidate.toJSON() } }));
            }
          };
          pc.onconnectionstatechange = () => setStatus("webrtc: " + pc.connectionState);

          const ch = pc.createDataChannel("screen");
          ch.binaryType = "arraybuffer";
          ch.onopen = () => setStatus("streaming");
          ch.onmessage = (ev) => {
            const blob = new Blob([ev.data], { type: "image/jpeg" });
            const objUrl = URL.createObjectURL(blob);
            const img = $("screen");
            img.onload = () => { if (lastUrl) URL.revokeObjectURL(lastUrl); lastUrl = objUrl; };
            img.src = objUrl;
            img.hidden = false;
            $("placeholder").hidden = true;
          };

          const off = await pc.createOffer();
          await pc.setLocalDescription(off);
          ws.send(JSON.stringify({ type: "signal", to: agentId, data: { kind: "offer", sdp: off.sdp } }));
        }
      }
    </script>
  </body>
</html>

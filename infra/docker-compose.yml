# Arna — full stack for the VPS.
#   caddy    : reverse proxy + automatic HTTPS for the website + backend
#   website  : Next.js landing (arna.ifleon.com)
#   backend  : Rust signaling hub (api.arna.ifleon.com)
#   coturn   : TURN/STUN relay (turn.arna.ifleon.com) — host network for UDP relay
#
# Copy .env.example -> .env and coturn/turnserver.conf.example -> coturn/turnserver.conf
# before running:  docker compose up -d --build

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - website
      - backend

  website:
    build: ../website
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"

  backend:
    build: ../backend
    restart: unless-stopped
    environment:
      - PORT=8081
      - RUST_LOG=info
    expose:
      - "8081"

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

volumes:
  caddy_data:
  caddy_config:

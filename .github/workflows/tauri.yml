name: desktop

# Builds the unified Arna desktop app (console/) for Windows, macOS, and Linux.
#
#   • Run manually (Actions → desktop → Run workflow) to get installers as
#     downloadable artifacts. Optionally type a Backend URL to bake in.
#   • Push a tag `v*` to build all three and attach them to a DRAFT GitHub
#     Release.
#
# The Backend URL is baked into the build so installed apps connect
# automatically. Priority: manual input → repo variable ARNA_BACKEND → the
# default below.
on:
  workflow_dispatch:
    inputs:
      backend:
        description: "Backend URL to bake in (ws:// or wss://). Blank = default."
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write # create releases on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    env:
      ARNA_URL: ${{ github.event.inputs.backend || vars.ARNA_BACKEND || 'ws://187.124.99.4:48080/ws' }}
    steps:
      - uses: actions/checkout@v4

      # System libraries the Tauri shell + the agent engine (screen capture,
      # input injection, audio) need on Linux.
      - name: Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libxdo-dev libxcb1-dev libxrandr-dev libxcb-randr0-dev \
            libdbus-1-dev libasound2-dev libclang-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      # OpenH264 (the video encoder) builds from source and needs nasm on all OSes.
      - uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: console/src-tauri -> target

      - name: Install frontend deps
        working-directory: console
        run: npm install

      - name: Build installers (bakes the server URL)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ARNA_BACKEND: ${{ env.ARNA_URL }}
          ARNA_DEFAULT_BACKEND: ${{ env.ARNA_URL }}
        with:
          projectPath: console
          # On a tag, create/attach to a draft release; otherwise just build.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "Arna ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: "Arna desktop app. Connects to ${{ env.ARNA_URL }}."

      # Always expose the installers as downloadable artifacts (handy for manual
      # runs that aren't tagged releases).
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: arna-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            console/src-tauri/target/release/bundle/msi/*.msi
            console/src-tauri/target/release/bundle/nsis/*.exe
            console/src-tauri/target/release/bundle/dmg/*.dmg
            console/src-tauri/target/release/bundle/deb/*.deb
            console/src-tauri/target/release/bundle/appimage/*.AppImage
            console/src-tauri/target/release/bundle/rpm/*.rpm

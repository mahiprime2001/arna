name: release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
# Pre-release: use a tag with a hyphen, e.g. v0.1.0-beta.1
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: # run from a tag ref to (re)build a release

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push the backend image to GHCR

jobs:
  # 1) Cross-platform backend binaries -------------------------------------
  backend-binaries:
    name: backend (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl } # static
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: endsWith(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Build
        run: cargo build --release --locked --manifest-path backend/Cargo.toml --target ${{ matrix.target }}
      - name: Package
        run: |
          set -euo pipefail
          name="arna-backend-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          tar -czf "dist/${name}.tar.gz" \
            -C "backend/target/${{ matrix.target }}/release" arna-backend
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: dist/*

  # 2) Backend Docker image -> GHCR ----------------------------------------
  backend-image:
    name: backend image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Publish the GitHub Release ------------------------------------------
  release:
    name: publish release
    needs: [backend-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: cd dist && sha256sum * | tee SHA256SUMS.txt
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # 4) Desktop apps (Agent + Console) installers ---------------------------
